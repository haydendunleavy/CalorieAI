<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly — Glow Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f1e;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
    color: #f1f5f9;
  }

  h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 32px;
  }

  .toggle-row {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
  }

  .toggle-btn {
    padding: 10px 24px;
    border-radius: 50px;
    border: 1.5px solid #1e293b;
    background: transparent;
    color: #64748b;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .toggle-btn.active {
    background: #3b82f6;
    border-color: #3b82f6;
    color: #fff;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
  }

  .phones {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .phone-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .phone-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #475569;
  }

  .phone {
    width: 280px;
    background: #0f172a;
    border-radius: 40px;
    padding: 24px 16px 32px;
    border: 1.5px solid #1e293b;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }

  .phone.light {
    background: #f8fafc;
    border-color: #e2e8f0;
    box-shadow: 0 40px 80px rgba(0,0,0,0.2);
  }

  /* Notch */
  .notch {
    width: 90px;
    height: 24px;
    background: #0a0f1e;
    border-radius: 12px;
    margin: 0 auto 20px;
  }

  .phone.light .notch { background: #e2e8f0; }

  /* Header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .app-name {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #f1f5f9;
  }

  .phone.light .app-name { color: #0f172a; }

  .cog { font-size: 16px; }

  .greeting {
    font-size: 14px;
    font-weight: 700;
    color: #f1f5f9;
    padding: 0 4px;
    margin-bottom: 20px;
  }

  .phone.light .greeting { color: #0f172a; }

  /* Ring */
  .ring-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }

  .ring-container {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .ring-glow-subtle {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .ring-glow-strong {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.28) 0%, rgba(59,130,246,0.08) 50%, transparent 70%);
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
  }

  svg { transform: rotate(90deg); }

  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .ring-number {
    font-size: 22px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -1px;
    line-height: 1;
  }

  .phone.light .ring-number { color: #0f172a; }

  .ring-label {
    font-size: 10px;
    font-weight: 500;
    color: #64748b;
    letter-spacing: 0.3px;
  }

  /* Calorie row */
  .cal-row {
    display: flex;
    justify-content: space-around;
    margin-bottom: 16px;
  }

  .cal-stat { text-align: center; }

  .cal-num {
    font-size: 15px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1;
  }

  .phone.light .cal-num { color: #0f172a; }
  .cal-num.accent { color: #3b82f6; }
  .cal-label { font-size: 10px; color: #64748b; margin-top: 2px; }

  /* Macro card */
  .macro-card {
    background: #1e293b;
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1px solid #334155;
    position: relative;
    overflow: hidden;
  }

  .phone.light .macro-card {
    background: #fff;
    border-color: #e2e8f0;
  }

  .macro-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
  }

  .macro-name { font-weight: 600; color: #f1f5f9; }
  .phone.light .macro-name { color: #0f172a; }
  .macro-val { color: #64748b; font-size: 10px; }

  .bar-track {
    height: 7px;
    border-radius: 4px;
    background: #0f172a;
    overflow: visible;
    position: relative;
  }

  .phone.light .bar-track { background: #f1f5f9; }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    position: relative;
  }

  /* Subtle glow on bars */
  .bar-fill.protein { background: #FF6B6B; }
  .bar-fill.carbs   { background: #FFD93D; }
  .bar-fill.fat     { background: #6BCB77; }

  .bar-fill.protein.glow-subtle { box-shadow: 0 0 6px rgba(255,107,107,0.4); }
  .bar-fill.carbs.glow-subtle   { box-shadow: 0 0 6px rgba(255,217,61,0.4); }
  .bar-fill.fat.glow-subtle     { box-shadow: 0 0 6px rgba(107,203,119,0.4); }

  .bar-fill.protein.glow-strong { box-shadow: 0 0 12px rgba(255,107,107,0.7), 0 0 4px rgba(255,107,107,1); }
  .bar-fill.carbs.glow-strong   { box-shadow: 0 0 12px rgba(255,217,61,0.7),  0 0 4px rgba(255,217,61,1); }
  .bar-fill.fat.glow-strong     { box-shadow: 0 0 12px rgba(107,203,119,0.7), 0 0 4px rgba(107,203,119,1); }

  /* Camera button */
  .fab-wrap {
    display: flex;
    justify-content: flex-end;
    padding: 12px 4px 0;
  }

  .fab {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: #1e293b;
    border: 1px solid #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
  }

  .phone.light .fab { background: #f1f5f9; border-color: #e2e8f0; }

  .fab.glow-subtle { box-shadow: 0 0 16px rgba(59,130,246,0.25); }
  .fab.glow-strong { box-shadow: 0 0 24px rgba(59,130,246,0.5), 0 0 8px rgba(59,130,246,0.8); animation: fabpulse 2.5s ease-in-out infinite; }

  @keyframes fabpulse {
    0%, 100% { box-shadow: 0 0 24px rgba(59,130,246,0.5), 0 0 8px rgba(59,130,246,0.8); }
    50% { box-shadow: 0 0 36px rgba(59,130,246,0.7), 0 0 12px rgba(59,130,246,1); }
  }
</style>
</head>
<body>

<h1>Macroly · Glow Preview</h1>

<div class="toggle-row">
  <button class="toggle-btn active" onclick="setGlow('subtle')">Subtle (Apple)</button>
  <button class="toggle-btn" onclick="setGlow('strong')">Strong (Copilot)</button>
  <button class="toggle-btn" onclick="setGlow('none')">No Glow</button>
</div>

<div class="phones">

  <!-- Dark Mode -->
  <div class="phone-wrap">
    <div class="phone-label">Dark Mode</div>
    <div class="phone" id="dark">
      <div class="notch"></div>

      <div class="app-header">
        <span class="app-name">Macroly</span>
        <span class="cog">⚙️</span>
      </div>
      <div class="greeting">Hey HyDrate 👋</div>

      <div class="ring-wrap">
        <div class="ring-container">
          <div class="ring-glow-subtle" id="ring-glow-dark"></div>
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="54" fill="none" stroke="#1e293b" stroke-width="16" stroke-linecap="round"/>
            <circle cx="70" cy="70" r="54" fill="none" stroke="#3b82f6" stroke-width="16" stroke-linecap="round"
              stroke-dasharray="339.3" stroke-dashoffset="204"
              filter="url(#glow)"/>
            <defs>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
          </svg>
          <div class="ring-text">
            <span class="ring-number">1200</span>
            <span class="ring-label">cals left</span>
          </div>
        </div>
      </div>

      <div class="cal-row">
        <div class="cal-stat"><div class="cal-num">2000</div><div class="cal-label">Goal</div></div>
        <div class="cal-stat"><div class="cal-num accent">800</div><div class="cal-label">Eaten</div></div>
        <div class="cal-stat"><div class="cal-num">1200</div><div class="cal-label">Left</div></div>
      </div>

      <div class="macro-card">
        <div>
          <div class="macro-row"><span class="macro-name">Protein</span><span class="macro-val">50g / 150g</span></div>
          <div class="bar-track" style="margin-top:5px"><div class="bar-fill protein glow-subtle" style="width:33%"></div></div>
        </div>
        <div>
          <div class="macro-row"><span class="macro-name">Carbs</span><span class="macro-val">80g / 200g</span></div>
          <div class="bar-track" style="margin-top:5px"><div class="bar-fill carbs glow-subtle" style="width:40%"></div></div>
        </div>
        <div>
          <div class="macro-row"><span class="macro-name">Fat</span><span class="macro-val">20g / 65g</span></div>
          <div class="bar-track" style="margin-top:5px"><div class="bar-fill fat glow-subtle" style="width:30%"></div></div>
        </div>
      </div>

      <div class="fab-wrap">
        <div class="fab glow-subtle" id="fab-dark">📷</div>
      </div>
    </div>
  </div>

  <!-- Light Mode -->
  <div class="phone-wrap">
    <div class="phone-label">Light Mode</div>
    <div class="phone light" id="light">
      <div class="notch"></div>

      <div class="app-header">
        <span class="app-name">Macroly</span>
        <span class="cog">⚙️</span>
      </div>
      <div class="greeting" style="color:#0f172a">Hey HyDrate 👋</div>

      <div class="ring-wrap">
        <div class="ring-container">
          <div class="ring-glow-subtle" id="ring-glow-light"></div>
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="54" fill="none" stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>
            <circle cx="70" cy="70" r="54" fill="none" stroke="#3b82f6" stroke-width="16" stroke-linecap="round"
              stroke-dasharray="339.3" stroke-dashoffset="204"
              filter="url(#glow2)"/>
            <defs>
              <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
          </svg>
          <div class="ring-text">
            <span class="ring-number" style="color:#0f172a">1200</span>
            <span class="ring-label">cals left</span>
          </div>
        </div>
      </div>

      <div class="cal-row">
        <div class="cal-stat"><div class="cal-num" style="color:#0f172a">2000</div><div class="cal-label">Goal</div></div>
        <div class="cal-stat"><div class="cal-num accent">800</div><div class="cal-label">Eaten</div></div>
        <div class="cal-stat"><div class="cal-num" style="color:#0f172a">1200</div><div class="cal-label">Left</div></div>
      </div>

      <div class="macro-card">
        <div>
          <div class="macro-row"><span class="macro-name" style="color:#0f172a">Protein</span><span class="macro-val">50g / 150g</span></div>
          <div class="bar-track" style="margin-top:5px;background:#f1f5f9"><div class="bar-fill protein glow-subtle" style="width:33%"></div></div>
        </div>
        <div>
          <div class="macro-row"><span class="macro-name" style="color:#0f172a">Carbs</span><span class="macro-val">80g / 200g</span></div>
          <div class="bar-track" style="margin-top:5px;background:#f1f5f9"><div class="bar-fill carbs glow-subtle" style="width:40%"></div></div>
        </div>
        <div>
          <div class="macro-row"><span class="macro-name" style="color:#0f172a">Fat</span><span class="macro-val">20g / 65g</span></div>
          <div class="bar-track" style="margin-top:5px;background:#f1f5f9"><div class="bar-fill fat glow-subtle" style="width:30%"></div></div>
        </div>
      </div>

      <div class="fab-wrap">
        <div class="fab glow-subtle" id="fab-light" style="background:#f1f5f9;border-color:#e2e8f0">📷</div>
      </div>
    </div>
  </div>

</div>

<script>
  let current = 'subtle';

  function setGlow(mode) {
    current = mode;

    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    const bars = document.querySelectorAll('.bar-fill');
    const fabs = document.querySelectorAll('.fab');
    const ringGlows = document.querySelectorAll('.ring-glow-subtle, .ring-glow-strong');

    bars.forEach(b => {
      b.classList.remove('glow-subtle', 'glow-strong');
      if (mode !== 'none') b.classList.add(mode === 'subtle' ? 'glow-subtle' : 'glow-strong');
    });

    fabs.forEach(f => {
      f.classList.remove('glow-subtle', 'glow-strong');
      if (mode !== 'none') f.classList.add(mode === 'subtle' ? 'glow-subtle' : 'glow-strong');
    });

    ringGlows.forEach(r => {
      r.className = mode === 'strong' ? 'ring-glow-strong' : (mode === 'subtle' ? 'ring-glow-subtle' : '');
    });

    // SVG filter intensity
    document.querySelectorAll('feGaussianBlur').forEach(f => {
      f.setAttribute('stdDeviation', mode === 'strong' ? '5' : mode === 'subtle' ? '3' : '0');
    });
  }
</script>

</body>
</html>
